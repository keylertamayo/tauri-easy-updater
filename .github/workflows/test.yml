name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    # Tauri v1 + javascriptcore-rs-sys 0.4 expect WebKitGTK/JavaScriptCore 4.0 (.pc names).
    # ubuntu-latest (24.04) ships 4.1-only stacks and breaks pkg-config for 4.0; 22.04 matches Tauri v1 docs.
    runs-on: ubuntu-22.04
    env:
      PKG_CONFIG_PATH: /usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
      LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri / GTK / WebKit)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev

      - name: Install JS deps
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build JS packages
        run: pnpm build

      - name: Build Rust crate
        run: cargo build --manifest-path crates/tauri-easy-updater/Cargo.toml
