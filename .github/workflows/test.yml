name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies (Tauri / GTK / WebKit)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config
          # javascriptcore-rs-sys: javascriptcoregtk-4.0.pc — prefer 4.0-dev, fall back on newer Ubuntu
          sudo apt-get install -y libjavascriptcoregtk-4.0-dev \
            || sudo apt-get install -y libjavascriptcoregtk-4.1-dev
          # Tauri v1 pulls soup2-sys — needs libsoup 2.x, not libsoup-3.0-dev
          SOUP_PKGS=(libsoup2.4-dev libsoup-2.4-dev libsoup2-dev)
          INSTALLED=0
          for pkg in "${SOUP_PKGS[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              echo "Installing libsoup2 dev package: $pkg"
              sudo apt-get install -y "$pkg"
              INSTALLED=1
              break
            fi
          done
          if [ "$INSTALLED" -ne 1 ]; then
            echo "::error::No libsoup2 -dev package found (tried: ${SOUP_PKGS[*]})"
            exit 1
          fi

      - name: Configure pkg-config for JavaScriptCore
        run: |
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install JS deps
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build JS packages
        run: pnpm build

      - name: Build Rust crate
        run: cargo build --manifest-path crates/tauri-easy-updater/Cargo.toml
