name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies (Tauri / GTK / WebKit)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            pkg-config
          # Tauri v1 pulls soup2-sys — needs libsoup 2.x, not libsoup-3.0-dev
          SOUP_PKGS=(libsoup2.4-dev libsoup-2.4-dev libsoup2-dev)
          INSTALLED=0
          for pkg in "${SOUP_PKGS[@]}"; do
            if apt-cache show "$pkg" >/dev/null 2>&1; then
              echo "Installing libsoup2 dev package: $pkg"
              sudo apt-get install -y "$pkg"
              INSTALLED=1
              break
            fi
          done
          if [ "$INSTALLED" -ne 1 ]; then
            echo "::error::No libsoup2 -dev package found (tried: ${SOUP_PKGS[*]})"
            exit 1
          fi
      - name: Install JS deps
        run: pnpm install
      - name: Build JS packages
        run: pnpm build
      - name: Publish core and CLI to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/core && npm publish --access public
          cd ../cli && npm publish --access public
      - name: Publish crate to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd crates/tauri-easy-updater
          cargo publish

